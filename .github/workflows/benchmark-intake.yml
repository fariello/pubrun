name: Benchmark intake (validate-only)

# Phase 1 of benchmark-intake (IPD 20260721-2255-01): a VALIDATE-ONLY intake for
# community benchmark submissions. It parses an attacker-controlled attachment from a
# public issue as DATA ONLY, then comments a pass/fail receipt. It writes NOTHING to any
# branch (contents permission is read-only); archival/aggregation is Phase 2, gated behind a
# hard security review. The issue body is never interpolated into a shell: it is passed via
# an environment variable and parsed by Python.

on:
  issues:
    types: [opened, edited]

# Least privilege: read the repo (for the checked-out validator/schema) and write issue
# comments/labels. NO contents:write in Phase 1.
permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    # Gate on the benchmark-submission label the Issue Form applies. This keeps the workflow
    # from running on unrelated issues and only acts on the intended template.
    if: contains(join(github.event.issue.labels.*.name, ','), 'type:benchmark-submission')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validator dependencies (jsonschema only)
        run: pip install jsonschema

      - name: Extract the attachment URL from the issue body
        id: extract
        env:
          # The issue body is UNTRUSTED. Pass it as an env var (not a shell arg) so nothing
          # in it is shell-evaluated; Python reads it from the environment.
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 .github/scripts/extract_attachment_url.py

      - name: Validate the submission (validate-only; no writes)
        id: validate
        if: steps.extract.outputs.url != ''
        env:
          ATTACHMENT_URL: ${{ steps.extract.outputs.url }}
        run: |
          # ATTACHMENT_URL comes from an allowlisted-host extractor and is passed via env;
          # the validator re-checks the host allowlist, byte cap, and redirects and fails
          # closed. It never echoes the payload. Capture the verdict for the receipt.
          python3 .github/scripts/validate_benchmark_submission.py \
            --url "$ATTACHMENT_URL" --out verdict.json || true

      - name: Comment a pass/fail receipt and set a status label
        uses: actions/github-script@v7
        env:
          EXTRACT_ERROR: ${{ steps.extract.outputs.error }}
        with:
          script: |
            const fs = require('fs');
            let verdict = null;
            try {
              verdict = JSON.parse(fs.readFileSync('verdict.json', 'utf8'));
            } catch (e) {
              verdict = null;
            }
            const extractError = process.env.EXTRACT_ERROR || '';
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;

            let body, addLabel, removeLabel;
            if (!verdict) {
              const why = extractError
                ? extractError
                : 'no valid `.json` attachment was found on an allowlisted GitHub host';
              body = [
                'Automated benchmark-result check: **needs fix**.',
                '',
                'I could not validate a submission because ' + why + '.',
                '',
                'Please attach the `*.redacted.json` file that `pubrun bench` produced',
                '(drag the file into the issue; do not paste the JSON inline), then edit',
                'the issue to re-run the check.',
              ].join('\n');
              addLabel = 'status:needs-fix';
              removeLabel = 'status:accepted';
            } else if (verdict.accepted) {
              body = [
                'Automated benchmark-result check: **passed**. Thank you for contributing!',
                '',
                '- schema: pubrun-benchmark/5',
                '- share-safety ruleset: v' + verdict.share_safety_version,
                '',
                'A maintainer will review and accept it. Nothing is stored automatically yet.',
              ].join('\n');
              addLabel = 'status:accepted';
              removeLabel = 'status:needs-fix';
            } else {
              body = [
                'Automated benchmark-result check: **needs fix**.',
                '',
                '- failing stage: `' + verdict.stage + '`',
                '- reason: ' + verdict.reason,
                '',
                'Re-run `pubrun bench` (which writes a redacted file and share-checks it),',
                'attach the `*.redacted.json` file, and edit the issue to re-run the check.',
              ].join('\n');
              addLabel = 'status:needs-fix';
              removeLabel = 'status:accepted';
            }

            await github.rest.issues.createComment({ owner, repo, issue_number, body });
            // Best-effort label hygiene (labels are created by a maintainer; ignore misses).
            try {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [addLabel] });
            } catch (e) {}
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: removeLabel });
            } catch (e) {}
