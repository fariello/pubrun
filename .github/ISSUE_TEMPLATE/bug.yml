name: Bug Report
description: File a bug report to help us improve pubrun
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide a minimal code snippet or execution commands to reproduce the issue.
      placeholder: |
        1. Run command '...'
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Please share your operating system, Python version, and pubrun version.
      placeholder: |
        - OS: e.g., Ubuntu 22.04 / WSL2
        - Python version: e.g., 3.12.3
        - pubrun version: e.g., 1.1.2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Stack Traces
      description: Paste any relevant terminal output, standard error, or manifest.json snippets.
      render: Shell
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g. process OOM, suspending/resuming the machine).
