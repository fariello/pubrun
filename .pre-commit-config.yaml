repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Local hygiene guard: block absolute home paths / hostname (and, if enabled in
  # .sanitize-local.toml, IPs) from being committed. Runs after the fixers and gitleaks
  # so it sees the final staged bytes. See scripts/sanitize_paths.py and
  # .sanitize-local.toml.example. To auto-fix: python3 scripts/sanitize_paths.py --fix
  - repo: local
    hooks:
      - id: sanitize-paths
        name: sanitize home paths / hostname / IPs
        entry: python3 scripts/sanitize_paths.py --check
        language: system
        pass_filenames: true
        require_serial: true

      # Post-commit: stamp src/pubrun/COMMIT with the just-made HEAD so the packaged
      # fallback stays current (pubrun.__commit__ prefers live git in a checkout). Runs
      # after the commit; the refreshed file rides along with the next commit. Install with
      # `pre-commit install --hook-type post-commit`.
      - id: update-commit-file
        name: stamp src/pubrun/COMMIT with HEAD
        entry: python3 scripts/update_commit_file.py
        language: system
        stages: [post-commit]
        always_run: true
        pass_filenames: false
