# ==========================================
#  pubrun Configuration
# ==========================================
# Documentation: https://github.com/fariello/pubrun
#
# This file contains the default configuration for pubrun. When your script
# runs, pubrun looks for user and project config files that override these.
#
# Resolution Order (highest to lowest precedence):
#   1. Explicit API arguments (e.g., pubrun.start(profile="deep"))
#   2. Environment variables (e.g., PUBRUN_PROFILE="deep")
#   3. Local project override (./.pubrun.toml)
#   4. User home defaults (~/.config/pubrun/config.toml)
#   5. This default file.

[core]
# -----------------------------------------------------------------------------
# Core behaviors for run initialization and storage.
# -----------------------------------------------------------------------------

# DEPRECATED and INERT: `profile` does NOT control capture depth and never did.
# It is still accepted (so existing configs/scripts do not break) but has no effect;
# a notice is recorded in the run manifest if you set it to a non-default value.
# To control capture depth, set the specific `capture.*` keys below
# (e.g. capture.hardware.depth, capture.packages.mode).
# Values (accepted, ignored): "minimal", "default", "deep"
profile = "default"

# Base directory for run output. pubrun creates timestamped subdirectories
# inside this path for each run. Empty string defaults to ./runs/.
output_dir = ""

# If true, `import pubrun` starts a trace automatically. If false, you must
# call pubrun.start() or use @audit_run to begin tracking.
auto_start = true

# Path to a parent meta.json for HPC parent-child hydration.
# Set via PUBRUN_META_REF env var or pubrun.start(meta_ref="path.json").
# When set, `pubrun report` and `pubrun methods` hydrate from the parent.
# meta_ref = ""


[imports]
# -----------------------------------------------------------------------------
# Import behavior presets.
# Controls what happens when `import pubrun` is executed.
# -----------------------------------------------------------------------------

# Import behavior preset.
# Values:
#   "auto"      - import pubrun starts tracking and enables normal capture hooks (default).
#   "full"      - like "auto", but ALSO forces the console tee on (captures stdout/stderr
#                 regardless of capture_mode below). The opposite of "noconsole".
#   "noauto"    - import pubrun loads the API, but tracking starts only after pubrun.start().
#   "nopatch"   - import pubrun starts tracking, but avoids process-global hooks
#                 (no subprocess/console patching; signal handlers stay active).
#   "noconsole" - import pubrun starts tracking, but skips wrapping console streams.
#   "minimal"   - import pubrun loads the API only, with no auto-start and no hooks.
# Note: an in-code `import pubrun.<mode>` overrides this key and env vars; only
# `pubrun run --mode <mode>` overrides the in-code import.
mode = "auto"

# What to do if a later import requests a different effective import behavior.
# Values: "ignore", "warn", "error"
on_conflict = "warn"

# Record the file or package that selected the import mode in manifest metadata.
record_provenance = true

# Number of external caller frames to record for import diagnostics.
provenance_depth = 3

# How file paths should be written in import provenance metadata.
# Values: "absolute", "relative", "basename", "redacted"
provenance_path_mode = "relative"

# Maximum number of import-mode requests to retain in metadata.
max_requests = 50


[console]
# -----------------------------------------------------------------------------
# Interception and logging of stdout/stderr.
# -----------------------------------------------------------------------------

# How pubrun handles print output and error tracebacks.
# Values:
#   "off"      - No capture; streams are untouched (default).
#   "basic"    - Tee stdout/stderr to text files in the run directory.
#   "standard" - Tee with timestamps on each line.
#   "deep"     - Reserved for future structured capture (currently same as standard).
#
# Default is "off" so that `import pubrun` never wraps sys.stdout/stderr
# without explicit opt-in. Set to "standard" for full output capture.
capture_mode = "off"

# Override capture behavior when stdout is not a TTY (piped or redirected).
# Values:
#   "inherit"  - Use capture_mode as-is (default).
#   "off"      - Disable capture when not a TTY.
#   "basic"    - Downgrade to basic (no timestamps) when piped.
non_tty_mode = "inherit"

# Override capture behavior when running inside Jupyter/IPython.
# Jupyter replaces sys.stdout with its own wrapper; double-wrapping can
# cause issues. Default "off" auto-disables capture in notebooks.
# Set to "standard" to force capture even in Jupyter.
jupyter_mode = "off"


[events]
# -----------------------------------------------------------------------------
# Controls the real-time events.jsonl stream (phases, annotations, errors).
# -----------------------------------------------------------------------------

# Whether to write events to events.jsonl during the run.
enabled = true

# Maximum number of regular events written per run. When exhausted, non-critical
# events are silently dropped. Critical events (annotations, phases) bypass this
# limit up to a secondary cap of 10x this value (minimum 10,000).
max_tracked_events = 1000000

# Number of non-critical events to buffer before flushing to disk. Higher values
# improve throughput but increase data loss window on hard crashes. Critical events
# (annotations, phases) always flush immediately regardless of this setting.
flush_interval_events = 100

# Behavior when pubrun.annotate() or pubrun.phase() is called with no
# active run.
# Values: "ignore" (default, safest), "warn", "error" (raises RuntimeError)
on_inactive_annotate = "ignore"


[redaction]
# -----------------------------------------------------------------------------
# Security policies to prevent secrets from leaking into manifest files.
# -----------------------------------------------------------------------------

# Regex pattern for detecting sensitive variable names in environment variables,
# CLI arguments, and runtime configuration. Matching values are masked.
# Covers: passwords, secrets, tokens, API keys, auth credentials, private keys,
# database connection strings, bearer tokens, and signing keys.
sensitive_keys_regex = "(?i)(password|secret|token|api_key|key|auth|cred|private|conn_str|connection_string|database_url|dsn|signing|bearer)"

# How detected sensitive values are masked before writing to disk.
# Values:
#   "redacted" - Value replaced with a generic [REDACTED] marker (default).
#   "hashed"   - Value replaced with a SHA-256 hash, allowing change detection
#                across runs without exposing the raw value.
representation = "redacted"

# Whether to redact matching environment variable values in the manifest.
env_enabled = true

# Whether to redact matching CLI argument values in sys.argv and subprocess
# argv records. Applies to both --flag=value and --flag VALUE patterns where
# the flag name matches the sensitive_keys_regex.
argv_enabled = true


[capture]
# -----------------------------------------------------------------------------
# Per-category depth controls. Values: "off", "basic", "standard", "deep".
# Each category can override the master profile.
# -----------------------------------------------------------------------------

[capture.environment]
# How system environment variables are recorded.
# Values:
#   "allowlist" - Only explicitly permitted variables.
#   "filtered"  - All variables, with secret redaction applied.
#   "full"      - Raw dump without filtering (unsafe).
mode = "filtered"
depth = "standard"

[capture.packages]
# How Python dependency versions are tracked.
# Values:
#   "imported-only"        - Scan sys.modules for libraries used by the script.
#   "imported-transitive"  - Imported packages plus their declared dependencies.
#   "top-level-installed"  - List packages from pip/conda.
#   "full-environment"     - Every dependency in the virtual environment.
mode = "imported-only"
depth = "standard"

[capture.subprocesses]
# Whether to intercept subprocess.Popen and os.system calls to record
# spawned processes.
enabled = true
depth = "basic"

# Stop recording after this many subprocesses to prevent runaway memory usage.
max_tracked_commands = 5000

[capture.process]
# OS-level process details: PID, parent PID, user, thread IDs.
depth = "standard"

[capture.host]
# Static machine details: hostname, kernel, platform.
depth = "standard"

[capture.python]
# Python runtime: CPython version, virtual environment paths.
depth = "standard"

[capture.git]
# Git repository state: branch, commit hash, remote URL, dirty status.
depth = "standard"

# Whether to run `git status --porcelain` to detect uncommitted changes.
# On large repos or network-mounted filesystems this can be slow (~100ms+).
# Set to false to skip the dirty check for faster startup.
check_dirty = true

# Per-command timeout (seconds) for every git invocation, including repository
# detection. On a slow/large repo or network filesystem, a timeout is recorded
# as capture_state "timeout" (distinct from "not a git repository") rather than
# silently dropping git metadata.
timeout = 5


[capture.inputs]
# -----------------------------------------------------------------------------
# Detects input files passed via CLI (sys.argv).
# -----------------------------------------------------------------------------

# Whether to scan sys.argv for file paths.
enabled = true

# File extensions to skip (e.g., ["pyc", "log"]).
ignore_extensions = []

# If true, compute MD5 hashes of all detected input files. Provides maximum
# reproducibility but is slow for large files. If false, records only
# mtime and size.
compute_md5 = false


[capture.hardware]
# -----------------------------------------------------------------------------
# Physical hardware inspection depth.
# -----------------------------------------------------------------------------

# At "basic" or "standard" depth, captures CPU model, core count, architecture,
# and GPU make/model.
depth = "basic"

# Per-command timeout (seconds) for hardware-inspection subprocesses
# (nvidia-smi, system_profiler, sysctl, wmic). Bounds a hung tool (e.g. a
# wedged GPU driver) so it cannot orphan the background hardware thread or leave
# the manifest's hardware section stuck as non-terminal "pending".
timeout = 10

# Advanced flags for ML reproducibility. These require slow system calls
# (NVML queries, /proc reads) and are opt-in even when depth is "deep".
capture_gpu_clock_speed = false
capture_gpu_fp_precision = false
capture_cpu_clock_speed = false
capture_cpu_fp_precision = false


[capture.resources]
# -----------------------------------------------------------------------------
# Background resource utilization sampling.
# -----------------------------------------------------------------------------

# When enabled, a background thread samples CPU and memory usage.
depth = "standard"

# Which RSS (resident memory) to measure: the main process only, or the entire
# process tree (parent + all descendant processes). Tree mode is useful for
# multiprocessing/Dask/Ray workloads where the main process is a thin orchestrator.
# Affects memory only -- CPU is always measured for the current process. Tree RSS
# is captured on Linux and macOS; Windows falls back to process scope.
# Values: "process" (default) | "tree"
scope = "process"

# Sampling interval in seconds. Shorter intervals give finer data but increase
# overhead and events.jsonl size.
sample_interval_seconds = 15

# Kill the background thread after this many consecutive read failures. Only
# unreadable polls (errors) count -- a legitimate RSS reading of 0 does not, so
# a transient blip cannot permanently disable telemetry.
max_consecutive_failures = 3

# Per-poll timeout (seconds) for resource-sampling subprocesses on macOS/Windows
# (ps/wmic). Bounds a hung tool so it cannot orphan the sampling thread.
poll_timeout = 3

# Also sample SYSTEM-WIDE dynamic metrics alongside per-process RSS/CPU: available
# memory, load average, and (Linux only) iowait. These make post-hoc I/O / contention
# diagnosis possible (e.g. "was this run starved for RAM or blocked on a busy node?").
# They are cheap (single /proc reads) and only sample when the resource watcher is
# running (depth != "off"). Note: iowait is a NODE-WIDE counter (not run-scoped) and is
# reported as "system_iowait_pct" -- indicative only. Set false to omit these.
system_metrics = true


[capture.file_io]
# -----------------------------------------------------------------------------
# File-I/O provenance detail for files opened via `pubrun.open(...)` (the opt-in,
# per-file API). This does NOT globally intercept open(); pubrun never patches the
# builtin. It only governs how much is recorded for files you explicitly route
# through pubrun.open().
# -----------------------------------------------------------------------------
# Progressive levels (each includes the ones before it):
#   "none"     - record nothing (pubrun.open() behaves like the builtin open()).
#   "name"     - record the path as given.
#   "stat"     - + fstat on the open fd (size, mtime, ctime) and the absolute path.
#                Cheap everywhere, including NFS (fstat on an already-open fd needs
#                no extra round-trip). DEFAULT.
#   "realpath" - + resolve symlinks to the canonical path. NOTE: this walks every
#                path component and can be noticeably COSTLIER on network
#                filesystems (NFS/Lustre) than "stat"; enable only if you need it.
#   "hash"     - + sha256 of the file contents. Reads every byte, so it is by far
#                the most expensive level; use only when content-level provenance
#                matters. Files larger than `max_hash_bytes` are recorded without a
#                hash.
level = "stat"

# At level "hash", skip hashing files larger than this (bytes). 0 = no cap.
max_hash_bytes = 0


[capture.profiling]
# -----------------------------------------------------------------------------
# Phase-scoped profiling (opt-in).
# When enabled, pubrun.phase() blocks are profiled and stats saved to the run dir.
# -----------------------------------------------------------------------------

# Master switch. Must be explicitly enabled.
enabled = false

# Profiling backend.
# Values:
#   "cprofile" - stdlib cProfile (zero dependencies, ~30-50% overhead within phase).
#   "yappi"    - requires `pip install yappi` (~10-20% overhead, wall+CPU time).
# If the selected backend is unavailable, logs a warning and skips.
backend = "cprofile"


[capture.signals]
# -----------------------------------------------------------------------------
# OS signal and exit-code capture.
# -----------------------------------------------------------------------------

# When enabled, pubrun installs thin shim signal handlers that record received
# signals (SIGINT, SIGTERM, SIGHUP, etc.) and chain to the previous handler
# without disrupting the importing script. Also captures the process exit code.
enabled = true


[capture.determinism]
# Track or lock pseudorandom seeds (Python random, numpy.random).
# NOTE: Not yet implemented. Reserved for future use.
depth = "off"


[logging]
# -----------------------------------------------------------------------------
# Output generation.
# -----------------------------------------------------------------------------

# Whether to write a human-readable summary.txt in the run directory.
# NOTE: Not yet implemented. Reserved for future use.
write_summary = false

[methods]
# -----------------------------------------------------------------------------
# Academic methods paragraph generator.
# -----------------------------------------------------------------------------

# Default output format for `pubrun methods`.
# Values: "markdown", "latex"
format = "markdown"

[report]
# -----------------------------------------------------------------------------
# Controls for pubrun report / methods hydration behavior.
# -----------------------------------------------------------------------------

# When hydrating a manifest via meta_ref, reject paths that resolve outside
# the manifest's parent directory by default. Set to true to allow any path
# (use with caution on shared filesystems).
allow_external_meta_ref = false

# Allowlist of absolute directory paths that are permitted sources for
# meta_ref files. Paths must resolve under at least one of these prefixes
# to be accepted. Only consulted when allow_external_meta_ref is false.
# Example: ["/scratch/projects/myproject", "/shared/pubrun-meta"]
meta_ref_allowed_dirs = []


[diff]
# -----------------------------------------------------------------------------
# Semantic diff engine (pubrun diff).
# -----------------------------------------------------------------------------

# Keys excluded at each depth level to reduce noise. The levels are nested by intent:
# basic hides the MOST (a short, human-scannable summary of meaningful differences),
# standard hides less, and deep hides nothing. `basic` therefore extends `standard`.
#
# Volatile / always-different fields shared by every level (run ids, PIDs, timestamps,
# absolute run/tmp paths that differ every run — pure noise in a diff):
ignore_standard = [
    "timing", "run.run_id", "process.pid", "process.ppid",
    "hardware.memory_total_bytes",
    "resources.end_rss_bytes", "resources.peak_cpu_percent", "resources.peak_rss_bytes",
    "invocation.script.size", "invocation.script.path",
    "capture.run_dir",
    # Absolute per-run paths (differ every run; the fstype/is_network signal is kept).
    "filesystem.run_dir.path", "filesystem.run_dir.mount_point",
    "filesystem.tmpdir.path", "filesystem.tmpdir.mount_point",
    "filesystem.results_dir.path", "filesystem.pubrun_install.path",
    "pubrun_imports.selected_at_utc", "pubrun_imports.requests.*.timestamp_utc",
    "pubrun_imports.requests.*.caller.line_number",
    "*_utc", "*_utc.*"
]

# `basic` = everything `standard` hides PLUS the high-volume, low-signal sections. At basic
# the question is "did the SCRIPT / ENVIRONMENT / user-facing config change?", not "list every
# child process and package". Subprocess and package LISTS are summarized (count + identities)
# at standard rather than diffed element-by-element (see the diff engine); at basic they are
# hidden entirely. `invocation.command_line`/`rerun_command` are DERIVED from `invocation.argv`
# and collapsed when argv is present (engine-side), so a single argv change is reported once.
ignore_basic = [
    "timing", "run.run_id", "process.pid", "process.ppid",
    "hardware.memory_total_bytes",
    "resources.end_rss_bytes", "resources.peak_cpu_percent", "resources.peak_rss_bytes",
    "invocation.script.size", "invocation.script.path",
    "capture.run_dir",
    "filesystem.run_dir.path", "filesystem.run_dir.mount_point",
    "filesystem.tmpdir.path", "filesystem.tmpdir.mount_point",
    "filesystem.results_dir.path", "filesystem.pubrun_install.path",
    "pubrun_imports.selected_at_utc", "pubrun_imports.requests.*.timestamp_utc",
    "pubrun_imports.requests.*.caller.line_number",
    "*_utc", "*_utc.*",
    # Basic-only: hide the noisy full sections; standard summarizes, deep shows all.
    "process", "hardware", "resources", "environment", "subprocesses", "packages",
]

ignore_deep = []

# Whether to display unchanged values in diff output.
show_same = false

# Output format for --export: "txt" (flattened key=value) or "json" (nested).
export_format = "txt"

# If true, wrap long values across multiple lines. If false, truncate with
# ellipsis.
wrap = true

# Max characters per value before wrapping or truncation.
max_string_length = 300
